name: Build App

on:
  push:
    branches: [ "main" ]

# 消除 Node.js 警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: Windows
            arch: x64
            # Windows 正常打包
            build_cmd: pyinstaller --onefile --windowed app.py
            
          - os: macos-14
            name: Mac-M芯片
            arch: arm64
            # 强行锁死打包为 M 芯片原生架构
            build_cmd: pyinstaller --onefile --windowed --target-architecture arm64 app.py
            
          - os: macos-14
            name: Mac-Intel
            arch: x64
            # 强行锁死打包为老款 Intel 架构 (x86_64)
            build_cmd: pyinstaller --onefile --windowed --target-architecture x86_64 app.py

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: ${{ matrix.arch }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    # 执行我们在上方配置好的专属打包命令
    - name: Build with PyInstaller
      run: ${{ matrix.build_cmd }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: 独立软件-${{ matrix.name }}
        path: dist/
