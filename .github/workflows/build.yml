name: Build App

on:
  push:
    branches: [ "main" ]

# 消除 Node.js 版本警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      # 使用 include 来精确定义我们需要的三种系统环境
      matrix:
        include:
          - os: windows-latest
            name: Windows
          - os: macos-13      # macos-13 在 GitHub 上对应的是 Intel 芯片的机器
            name: Mac-Intel
          - os: macos-14      # macos-14 在 GitHub 上对应的是 M 系列芯片的机器
            name: Mac-M芯片

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: pyinstaller --onefile --windowed app.py

    # 将生成的 Artifact 名字加上对应的芯片后缀
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: 独立软件-${{ matrix.name }}
        path: dist/
