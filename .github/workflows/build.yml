name: Build App

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: Windows
            arch: x64
          - os: macos-14
            name: Mac-M芯片
            arch: arm64
          # 换成 macos-13 (这是现存最老的 Intel 服务器)
          - os: macos-13
            name: Mac-Intel
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: ${{ matrix.arch }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller (Mac Intel 向下兼容)
      if: matrix.name == 'Mac-Intel'
      # 施加魔法：强制打包出兼容 macOS 12 的程序
      run: env MACOSX_DEPLOYMENT_TARGET=12.0 pyinstaller --onefile --windowed app.py

    - name: Build with PyInstaller (Windows / Mac M芯片)
      if: matrix.name != 'Mac-Intel'
      run: pyinstaller --onefile --windowed app.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: 独立软件-${{ matrix.name }}
        path: dist/
