name: Build App

on:
  push:
    branches: [ "main" ]

# 消除 Node.js 警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        # 定义三种组合，重点在于 arch (架构) 参数的不同
        include:
          - os: windows-latest
            name: Windows
            arch: x64
          - os: macos-14
            name: Mac-M芯片
            arch: arm64  # M 芯片原生架构
          - os: macos-14
            name: Mac-Intel
            arch: x64    # 瞒天过海：在 M 芯片电脑上强行指定 Intel 架构

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        # 核心魔法：根据上方矩阵定义的架构，下载对应版本的 Python
        architecture: ${{ matrix.arch }} 

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: pyinstaller --onefile --windowed app.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: 独立软件-${{ matrix.name }}
        path: dist/
